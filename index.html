<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="assets/css/style.css">
    <title>Form UI</title>

</head>

<body>

    <form>

        <section class="container">

           <div class="formulario">
            
            <div class="nome">
            <label for="user">Nome Completo</label>
            <input type="text" id="user"  name="nome completo" placeholder="Como você se chama ?" required aria-required="true"/>
            </div>
            
            <div class="mail">
            <label for="email">Email</label>
            <input type="email" id="email" name="Email" placeholder="joao@gmail.com" required aria-required="true"/>
            </div>

            <div class="senha">
            <label for="pass">Digite a senha</label>
            <input type="password" id="pass" name="password" placeholder="xxxxxxxx" required aria-required="true"/>
            </div>

            <div class="confirmar">
            <label for="confirm-pass">Confirmar senha</label>
            <input type="password" id="confirm-pass" name="password" placeholder="xxxxxxxx" required aria-required="true"/>
            </div>

           <button type="submit" id="btn">Atualizar Perfil</button>

           </div>

                <div class="porcentagem-lista">

                    <div class="circulo">
                    <p class="porcentagem">85%</p>   
                    </div>

                    <h3 class="titulo-lista">Preenchimento do Perfil</h3>
        
                    <ol class="container-lista">
                        <li class="feito">Criar Perfil</li>
                        <li class="feito">Atualizar Progresso</li>
                        <li class="feito">Configurar perfil público</li>
                        <li class="a-fazer">Completar o seu primeiro projeto</li>
                    </ol>

                </div>

        </section>
        
    </form>
    
</body>

</html>
